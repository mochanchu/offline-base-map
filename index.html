<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tsunami Evacuation Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; }
        #map { height: 100vh; width: 100vw; }
    </style>
</head>
<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // --- 新しいFirebase設定を反映 ---
    const firebaseConfig = {
      apiKey: "AIzaSyCi4No-S47ZWa6PZpQDncly6gveHgYmqLI",
      authDomain: "tsunami-evacuation-map.firebaseapp.com",
      databaseURL: "https://tsunami-evacuation-map-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "tsunami-evacuation-map",
      storageBucket: "tsunami-evacuation-map.firebasestorage.app",
      messagingSenderId: "729874284256",
      appId: "1:729874284256:web:2f98a5dbd14c847e629a85"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // マップ初期化 (埼玉周辺を初期位置にしていますが、自由に変えてください)
    const map = L.map('map').setView([35.8617, 139.6455], 13); 

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap contributors',
        maxZoom: 18
    }).addTo(map);

    async function sendLocation() {
        if (!navigator.geolocation) return;

        navigator.geolocation.getCurrentPosition(async (position) => {
            try {
                // 'locations' コレクションに保存
                await addDoc(collection(db, "locations"), {
                    lat: position.coords.latitude,
                    lng: position.coords.longitude,
                    timestamp: serverTimestamp(),
                    deviceId: getDeviceId()
                });
                console.log("Location sent to Firebase!");
            } catch (e) {
                console.error("Error adding document: ", e);
            }
        }, null, { enableHighAccuracy: true });
    }

    function getDeviceId() {
        let id = localStorage.getItem('device_id');
        if (!id) {
            id = 'user_' + Math.random().toString(36).substring(2, 9);
            localStorage.setItem('device_id', id);
        }
        return id;
    }

    setInterval(sendLocation, 30000); // 30秒おき
    sendLocation();

    // Service Worker
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./sw.js').catch(err => console.error(err));
        });
    }
</script>
</body>
</html>
