<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>避難ナビ - 実験用</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; }
        #map { height: 100vh; width: 100vw; }
        #status {
            position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
            z-index: 1000; background: rgba(255,255,255,0.9); padding: 10px 20px;
            border-radius: 20px; font-weight: bold; box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>
    <div id="status">位置情報取得中...</div>
    <div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCi4No-S47ZWa6PZpQDncly6gveHgYmqLI",
      authDomain: "tsunami-evacuation-map.firebaseapp.com",
      projectId: "tsunami-evacuation-map",
      storageBucket: "tsunami-evacuation-map.firebasestorage.app",
      appId: "1:729874284256:web:2f98a5dbd14c847e629a85"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // 指定された4点
    const AREA_POLYGON = [
        [36.110889, 139.360278], [36.110306, 139.367194],
        [36.105889, 139.365111], [36.106222, 139.357861]
    ];

    function isInside(point, vs) {
        const x = point[0], y = point[1];
        let inside = false;
        for (let i = 0, j = vs.length - 1; i < vs.length; j = i++) {
            const xi = vs[i][0], yi = vs[i][1];
            const xj = vs[j][0], yj = vs[j][1];
            const intersect = ((yi > y) != (yj > y)) && (x < (xj - xi) * (y - yi) / (yj - yi) + xi);
            if (intersect) inside = !inside;
        }
        return inside;
    }

    const deviceId = localStorage.getItem('deviceId') || Math.random().toString(36).substring(2, 10);
    localStorage.setItem('deviceId', deviceId);

    const map = L.map('map').setView([36.1085, 139.3625], 16);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    
    // エリアを可視化（自分の位置が枠内か確認しやすくするため）
    L.polygon(AREA_POLYGON, { color: 'blue', weight: 1, fillOpacity: 0.05 }).addTo(map);

    let userMarker;

    navigator.geolocation.watchPosition(async (pos) => {
        const lat = pos.coords.latitude;
        const lng = pos.coords.longitude;

        // マーカーの更新
        if (userMarker) {
            userMarker.setLatLng([lat, lng]);
        } else {
            userMarker = L.marker([lat, lng]).addTo(map);
        }
        map.panTo([lat, lng]);

        // 範囲内判定と送信
        if (isInside([lat, lng], AREA_POLYGON)) {
            document.getElementById('status').innerText = "エリア内：データ送信中";
            document.getElementById('status').style.color = "green";
            await addDoc(collection(db, "2026-04-27_test"), {
                lat, lng, deviceId, timestamp: serverTimestamp()
            });
        } else {
            document.getElementById('status').innerText = "エリア外：送信停止中";
            document.getElementById('status').style.color = "red";
        }
    }, (err) => console.error(err), { enableHighAccuracy: true });
</script>
</body>
</html>
